<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba Element Form</title>
  </head>
  <body>
    <h1>Contoh Elemnt Element Form pada HTML</h1>

    <form>
      <label for="nama"
        >Nama:
        <input type="text" name="nama" placeholder="Masukkan nama" id="nama" />
      </label>
      <br />

      <label for="password"
        >Password
        <input type="password" name="password" id="password" />
      </label>
      <br />

      <label for="email"
        >Email
        <input type="email" name="email" id="email" />
      </label>
      <br />

      <label for="number"
        >Angka:
        <input
          type="number"
          name="number"
          id="number"
          min="0"
          max="100"
          step="5"
        />
      </label>
      <br />
      <label for="date"
        >Date:
        <input type="date" name="date" id="date" />
      </label>
      <br />

      <label for="warna"
        >Warna:
        <input type="color" name="warna" id="warna" />
      </label>
      <br />

      <label for="tel"
        >Telepone
        <input type="tel" name="tel" id="tel" />
      </label>
      <br />

      <label for="radio"
        >Jenis Kelamin:
        <input
          type="radio"
          name="jenis_kelamin"
          id="radio1"
          value="laki-laki"
        />Laki-Laki
        <input
          type="radio"
          name="jenis_kelamin"
          id="radio2"
          value="perempuan"
        />Perempuan
      </label>
      <br />
      <button>Kirim!</button>
    </form>
  </body>
</html>
