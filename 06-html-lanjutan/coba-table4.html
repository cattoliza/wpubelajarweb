    <title>Merging Table</title>
  </head>
  <body>
    <table border="1" cellspacing="0" cellpadding="5">
      <tr>
        <td>1,1</td>
        <td>1,2</td>
        <td>1,3</td>
      </tr>
      <tr>
        <td>2,1</td>
        <td rowspan="2" colspan="2">rowspan= "2" colspan= "2"</td>
      </tr>
      <tr>
        <td>3,1</td>
      </tr>
    </table>
  </body>
